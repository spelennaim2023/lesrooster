<div id="chatBox" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px;">
    </div>
<input type="text" id="msgInput" placeholder="Typ je bericht...">
<button onclick="verstuurBericht()">Verzenden</button>

<script type="module">
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(app);
    const chatBox = document.getElementById('chatBox');

    // 1. Live berichten ophalen (Realtime)
    const q = query(collection(db, "chats"), orderBy("timestamp", "asc"));
    onSnapshot(q, (snapshot) => {
        chatBox.innerHTML = ""; // Wis huidige lijst
        snapshot.forEach((doc) => {
            const data = doc.data();
            chatBox.innerHTML += `<p><b>${data.van}:</b> ${data.bericht}</p>`;
        });
        chatBox.scrollTop = chatBox.scrollHeight; // Scroll naar beneden
    });

    // 2. Berichten versturen
    window.verstuurBericht = async () => {
        const tekst = document.getElementById('msgInput').value;
        const wieBenIk = document.body.dataset.role || "Gebruiker"; // 'Admin' na Alt+A invoer
        
        await addDoc(collection(db, "chats"), {
            bericht: tekst,
            van: wieBenIk,
            timestamp: serverTimestamp()
        });
        document.getElementById('msgInput').value = "";
    };
</script>
